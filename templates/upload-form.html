<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BananaLeaf AI - Upload Photo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .hero-bg {
            background: #0a0a0a;
        }
        .upload-zone {
            border: 2px dashed rgba(100, 116, 139, 0.5);
            transition: all 0.3s ease;
        }
        .upload-zone:hover {
            border-color: rgba(34, 197, 94, 0.8);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Main Content - Upload Form -->
    <main class="hero-bg relative min-h-screen py-20 overflow-hidden" style="background: linear-gradient(180deg, #0b0d0f 0%, #0f1216 60%, #0b0d0f 100%);">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <!-- Page Title -->
            <div class="text-center mb-12">
                <div class="inline-flex items-center space-x-2 text-green-400 text-xs tracking-[0.4em] uppercase mb-6">
                    <span>Image Input</span>
                </div>
                <h1 class="text-4xl md:text-5xl font-semibold text-white mb-4">Upload a Banana Leaf Image</h1>
                <p class="text-gray-400 text-sm">Supported formats: JPG, PNG</p>
            </div>

            <!-- Upload Form Card -->
            <div class="bg-gray-800 bg-opacity-60 rounded-2xl p-8 border border-gray-700">
                <form id="uploadForm" action="/predict" method="POST" enctype="multipart/form-data">
                    <!-- Image Preview Area -->
                    <div id="imagePreviewContainer" class="hidden mb-6">
                        <div class="relative">
                            <img id="imagePreview" src="" alt="Preview" class="w-full h-auto rounded-xl border-2 border-gray-600">
                            <button type="button" id="removeImage" class="absolute top-3 right-3 bg-red-500 text-white rounded-full p-2 hover:bg-red-600 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Upload Area -->
                    <div id="uploadArea" class="upload-zone rounded-xl p-12 text-center cursor-pointer bg-gray-900 bg-opacity-40">
                        <input type="file" name="image" id="fileInput" accept="image/*" class="hidden" required>
                        <div class="flex flex-col items-center justify-center space-y-4">
                            <div class="bg-gray-700 bg-opacity-60 rounded-full p-5">
                                <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-white text-base font-medium mb-1">Drag & drop your image here</p>
                                <p class="text-gray-400 text-sm">or click to browse files</p>
                            </div>
                        </div>
                    </div>

                    <!-- Bottom Actions -->
                    <div class="flex items-center justify-between mt-6">
                        <div class="flex items-center space-x-2 text-gray-400 text-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <span id="fileStatus">No Image Selected</span>
                        </div>
                        
                        <button type="submit" id="analyzeButton" class="bg-gray-700 text-gray-400 px-6 py-2.5 rounded-lg font-medium cursor-not-allowed transition-colors" disabled>
                            Analyze Image
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const uploadArea = document.getElementById('uploadArea');
        const removeImageBtn = document.getElementById('removeImage');
        const analyzeButton = document.getElementById('analyzeButton');

        // Mobile menu toggle
        if (mobileMenuButton && mobileMenu) {
            mobileMenuButton.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // File input change handler
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imagePreview.src = event.target.result;
                    imagePreviewContainer.classList.remove('hidden');
                    uploadArea.classList.add('hidden');
                    analyzeButton.disabled = false;
                    analyzeButton.classList.remove('bg-gray-700', 'text-gray-400', 'cursor-not-allowed');
                    analyzeButton.classList.add('bg-green-500', 'text-black', 'hover:bg-green-400', 'cursor-pointer');
                    document.getElementById('fileStatus').textContent = file.name;
                };
                reader.readAsDataURL(file);
            }
        });

        // Remove image handler
        removeImageBtn.addEventListener('click', () => {
            fileInput.value = '';
            imagePreview.src = '';
            imagePreviewContainer.classList.add('hidden');
            uploadArea.classList.remove('hidden');
            analyzeButton.disabled = true;
            analyzeButton.classList.add('bg-gray-700', 'text-gray-400', 'cursor-not-allowed');
            analyzeButton.classList.remove('bg-green-500', 'text-black', 'hover:bg-green-400', 'cursor-pointer');
            document.getElementById('fileStatus').textContent = 'No Image Selected';
        });

        // Click to open file picker
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // Drag and drop functionality
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'rgba(34, 197, 94, 0.8)';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                fileInput.files = e.dataTransfer.files;
                const event = new Event('change');
                fileInput.dispatchEvent(event);
            }
        });
    </script>
</body>
</html>
