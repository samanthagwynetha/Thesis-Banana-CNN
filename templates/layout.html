<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BananaLeaf AI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .hero-bg {
            background: radial-gradient(1200px 600px at 50% -10%, rgba(34, 197, 94, 0.25), rgba(0, 0, 0, 0) 60%),
                        radial-gradient(800px 500px at 80% 10%, rgba(16, 185, 129, 0.2), rgba(0, 0, 0, 0) 55%),
                        linear-gradient(180deg, #0b0d0f 0%, #0f1216 60%, #0b0d0f 100%);
        }
        .page-gradient-dark {
            background: linear-gradient(180deg, #0b0d0f 0%, #0f1216 60%, #0b0d0f 100%);
        }
        .hero-title-glow {
            text-shadow: 0 0 18px rgba(34, 197, 94, 0.35);
        }
        .hero-button-glow {
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
        }
        .hero-subtle-grid {
            background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(circle at top, rgba(0,0,0,1), rgba(0,0,0,0));
        }
        .upload-zone {
            border: 2px dashed rgba(100, 116, 139, 0.5);
            transition: all 0.3s ease;
        }
        .upload-zone:hover {
            border-color: rgba(34, 197, 94, 0.8);
        }
        .progress-bar {
            height: 8px;
            background: rgba(100, 116, 139, 0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: currentColor;
            transition: width 0.3s ease;
        }

    </style>
</head>
<body class="{% block body_class %}bg-gray-50{% endblock %}">
    <!-- Header Navigation -->
    <header class="{% block header_class %}hero-bg{% endblock %}">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center space-x-2 hover:opacity-80 transition-opacity">
                    <div class="bg-green-600 rounded-lg p-2">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-semibold text-white">
                        Banana<span class="text-green-600">Leaf</span> AI
                    </span>
                </a>

                <div class="hidden md:flex items-center space-x-8">
                    <a href="/" class="flex items-center space-x-2 {% block nav_home %}text-gray-300 hover:text-green-400{% endblock %} transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                        <span class="font-medium">Home</span>
                    </a>
                    <a href="/#about" class="flex items-center space-x-2 text-gray-300 hover:text-green-400 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="font-medium">About</span>
                    </a>
                    <a href="/#model-comparison" class="flex items-center space-x-2 text-gray-300 hover:text-green-400 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                        <span class="font-medium">Model Comparison</span>
                    </a>
                    <a href="/#contact" class="flex items-center space-x-2 text-gray-300 hover:text-green-400 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <span class="font-medium">Contact</span>
                    </a>
                </div>

                <button id="mobile-menu-button" class="md:hidden text-gray-300 hover:text-green-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>

            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden md:hidden pb-4">
                <div class="flex flex-col space-y-3">
                    <a href="/" class="flex items-center space-x-2 {% block mobile_nav_home %}text-gray-300 hover:text-green-400{% endblock %} transition-colors py-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                        <span>Home</span>
                    </a>
                    <a href="/#about" class="flex items-center space-x-2 text-gray-300 hover:text-green-400 transition-colors py-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="font-medium">About Model</span>
                    </a>
                    <a href="/#instructions" class="flex items-center space-x-2 text-gray-300 hover:text-green-400 transition-colors py-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                        <span class="font-medium">Instructions</span>
                    </a>
                    <a href="/#contact" class="flex items-center space-x-2 text-gray-300 hover:text-green-400 transition-colors py-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <span class="font-medium">Contact</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    {% block content %}
    {% endblock %}

    <!-- Footer -->
    <footer style="background: linear-gradient(180deg, #0b0d0f 0%, #0f1216 60%, #0b0d0f 100%);" class="border-t border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <!-- Left: Brand -->
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-gray-400">© Banana Leaf Disease Detection</span>
                </div>

                <!-- Right: Project Info -->
                <div class="text-right">
                    <p class="text-sm text-gray-400">Thesis • BSCS</p>
                    <p class="text-xs text-gray-500 mt-1">ResNet50 • Model Optimization • Training Time Reduction</p>
                </div>
            </div>
        </div>
    </footer>
    
    <!-- Common Scripts -->
    <script>
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');

        if (mobileMenuButton && mobileMenu) {
            mobileMenuButton.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // Smooth scroll for anchor links (handles both #section and /#section formats)
        document.querySelectorAll('a[href*="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                const href = this.getAttribute('href');
                const hashIndex = href.indexOf('#');
                
                // Only handle if there's a hash
                if (hashIndex === -1) return;
                
                const hash = href.substring(hashIndex);
                const pathBeforeHash = href.substring(0, hashIndex);
                
                // Only prevent default if we're on the same page or it's a root page reference
                if (pathBeforeHash === '' || pathBeforeHash === '/' || pathBeforeHash === window.location.pathname) {
                    e.preventDefault();
                    const target = document.querySelector(hash);
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                }
            });
        });
    </script>
    {% block page_scripts %}{% endblock %}
    
</body>
</html>
