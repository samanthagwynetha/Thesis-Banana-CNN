<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BananaLeaf AI - Analysis Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .dark-bg {
            background: #0a0a0a;
        }
        .progress-bar {
            height: 8px;
            background: rgba(100, 116, 139, 0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: currentColor;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="dark-bg">
    <!-- Main Content - Results -->
    <main class="min-h-screen py-20" style="background: linear-gradient(180deg, #0b0d0f 0%, #0f1216 60%, #0b0d0f 100%);">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Header -->
            <div class="text-center mb-12">
                <div class="inline-flex items-center space-x-2 text-green-400 text-xs tracking-[0.4em] uppercase mb-6">
                    <span>Analysis Results</span>
                </div>
                <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Model Comparison</h1>
            </div>

            <!-- Image Preview -->
            <div class="flex justify-center mb-12">
                <div class="bg-gray-800 bg-opacity-60 rounded-2xl p-3 border border-green-500">
                    <!-- <img src="{{ url_for('static', filename='uploads/' + image_path) }}"  -->
                    <img src="{{ url_for('static', filename='assets/hero-bg.jpg') }}" 
                        alt="Analyzed banana leaf" 
                        class="w-48 h-auto rounded-lg">
                </div>
            </div>


            <!-- Comparison Cards -->
            <div class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                <!-- Baseline Model Card -->
                <div class="bg-gray-800 bg-opacity-60 border border-gray-700 rounded-2xl p-6">
                    <div class="mb-5">
                        <h3 class="text-lg font-semibold text-gray-300 mb-1">Baseline Model</h3>
                        <p class="text-xs text-gray-500">Standard ResNet50</p>
                    </div>

                    <!-- Predicted Class -->
                    <div class="mb-6">
                        <div class="flex items-center space-x-2 mb-3">
                            <div class="w-7 h-7 rounded-full bg-gray-700 flex items-center justify-center text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m7 7a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500">Predicted Class</p>
                                <p class="text-xl font-bold text-white">Black Sigatoka</p>
                            </div>
                        </div>
                    </div>

                    <!-- Confidence Score -->
                    <div class="mb-6">
                        <div class="flex items-center space-x-2 mb-2">
                            <div class="w-7 h-7 rounded-full bg-gray-700 flex items-center justify-center text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <p class="text-xs text-gray-500 mb-2">Confidence Score</p>
                                <div class="flex items-center justify-between">
                                    <div class="flex-1 progress-bar bg-gray-700 mr-3">
                                        <div class="progress-fill text-gray-400" style="width: 84%"></div>
                                    </div>
                                    <span class="text-base font-bold text-gray-400">84%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Inference Time -->
                    <div>
                        <div class="flex items-center space-x-2">
                            <div class="w-7 h-7 rounded-full bg-gray-700 flex items-center justify-center text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 2m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500">Inference Time</p>
                                <p class="text-base font-semibold text-white">103 ms</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Enhanced Model Card -->
                <div class="bg-gray-800 bg-opacity-60 border border-green-500 rounded-2xl p-6 relative">
                    <div class="absolute top-4 right-4">
                        <span class="inline-flex items-center bg-green-500 bg-opacity-20 border border-green-500 text-green-400 px-3 py-1 rounded-full text-xs font-semibold tracking-wider uppercase">Optimized</span>
                    </div>

                    <div class="mb-5">
                        <h3 class="text-lg font-semibold text-green-400 mb-1">Enhanced Model</h3>
                        <p class="text-xs text-gray-500">Optimized ResNet50</p>
                    </div>

                    <!-- Predicted Class -->
                    <div class="mb-6">
                        <div class="flex items-center space-x-2 mb-3">
                            <div class="w-7 h-7 rounded-full bg-green-600 bg-opacity-20 flex items-center justify-center text-green-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m7 7a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500">Predicted Class</p>
                                <p class="text-xl font-bold text-green-400">Black Sigatoka</p>
                            </div>
                        </div>
                    </div>

                    <!-- Confidence Score -->
                    <div class="mb-6">
                        <div class="flex items-center space-x-2 mb-2">
                            <div class="w-7 h-7 rounded-full bg-green-600 bg-opacity-20 flex items-center justify-center text-green-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <p class="text-xs text-gray-500 mb-2">Confidence Score</p>
                                <div class="flex items-center justify-between">
                                    <div class="flex-1 progress-bar bg-gray-700 mr-3">
                                        <div class="progress-fill text-green-400" style="width: 95.2%"></div>
                                    </div>
                                    <span class="text-base font-bold text-green-400">95.2%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Inference Time -->
                    <div>
                        <div class="flex items-center space-x-2">
                            <div class="w-7 h-7 rounded-full bg-green-600 bg-opacity-20 flex items-center justify-center text-green-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 2m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500">Inference Time</p>
                                <p class="text-base font-semibold text-green-400">92 ms</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');

        // Mobile menu toggle
        mobileMenuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
